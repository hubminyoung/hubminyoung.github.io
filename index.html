<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>식재 입지 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ee;--surface:#fff;--surface2:#f0ede6;--border:#ddd9d0;--border2:#c8c4ba;--accent:#4a7a3a;--accent-light:#e8f4e0;--accent2:#7a5010;--danger:#b03020;--danger-light:#fde8e0;--warn:#8a6010;--warn-light:#fef8e0;--info:#2060a0;--info-light:#e0ecf8;--text:#1a1a16;--text-dim:#4a4840;--text-muted:#9a9888;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;font-size:14px;}
header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:100;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;}
.logo-sub{font-size:10px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;}
.header-tags{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap;}
.htag{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 8px;border-radius:3px;background:var(--accent-light);color:var(--accent);border:1px solid #b8d8a0;letter-spacing:.06em;}
.layout{display:flex;flex:1;overflow:hidden;flex-direction:row;}
#mapWrap{flex:1;position:relative;min-height:0;}
.panel{width:420px;flex-shrink:0;background:var(--surface);border-left:2px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
@media(max-width:768px){
  .layout{flex-direction:column;}
  #mapWrap{height:45vh;flex:none;}
  .panel{width:100%;flex:1;border-left:none;border-top:2px solid var(--border);}
  .header-tags{display:none;}
  header{padding:8px 12px;}
  .logo-sub{display:none;}
}
.panel::-webkit-scrollbar{width:4px;}
.panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.psec{padding:16px 18px;border-bottom:1px solid var(--border);}
.slabel{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;font-weight:600;}
.search-row{display:flex;gap:6px;}
input[type=text]{flex:1;background:var(--bg);border:1.5px solid var(--border2);border-radius:5px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,122,58,.1);}
input[type=text]::placeholder{color:var(--text-muted);}
textarea{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:5px;padding:9px 12px;color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:vertical;min-height:80px;line-height:1.7;transition:border-color .2s;}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,122,58,.1);}
textarea::placeholder{color:var(--text-muted);}
button{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;transition:all .15s;white-space:nowrap;}
button:hover{background:#3a6a2a;}
button:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text-dim);border:1.5px solid var(--border2);font-size:11px;padding:6px 12px;}
.btn-ghost:hover{background:var(--surface2);}
.coord-line{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:7px;}
.analyze-btn{width:100%;padding:12px;font-size:13px;letter-spacing:.08em;box-shadow:0 2px 6px rgba(74,122,58,.2);}
.progress-wrap{margin-top:10px;display:none;}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width .4s ease;border-radius:2px;}
.progress-text{font-size:11px;color:var(--text-dim);margin-top:6px;}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.dc{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:10px 12px;}
.dc-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-weight:600;}
.dc-value{font-size:16px;font-weight:700;color:var(--accent2);line-height:1.2;}
.dc-unit{font-size:11px;color:var(--text-muted);font-weight:400;margin-left:2px;}
.dc-sub{font-size:11px;color:var(--text-dim);margin-top:3px;}
.src-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:3px;display:inline-block;margin-top:4px;}
.lc-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;margin-top:2px;}
.lc-forest{background:#d4ecd4;color:#1a5a1a;border:1px solid #90c890;}
.lc-grass{background:#e8f4d4;color:#3a5a10;border:1px solid #b0d480;}
.lc-urban{background:#e8e4dc;color:#4a4030;border:1px solid #b8b490;}
.lc-bare{background:#f0e8d8;color:#5a4020;border:1px solid #c8a870;}
.lc-water{background:#d4e8f4;color:#1a3a5a;border:1px solid #80b8d8;}
.lc-wetland{background:#d4eef0;color:#1a4848;border:1px solid #80c8cc;}
.lc-agri{background:#f4f0d4;color:#4a4010;border:1px solid #c8c070;}
.lc-unknown{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
.aq-good{color:#2a8a2a;font-weight:700;}.aq-moderate{color:#8a7010;font-weight:700;}.aq-bad{color:#b03020;font-weight:700;}
.hansen-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:14px;line-height:1.9;}
.iblock{margin-bottom:16px;}
.iblock-label{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-bottom:8px;font-weight:600;}
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;padding:4px 10px;border-radius:4px;font-weight:500;}
.tag-risk{background:var(--danger-light);color:var(--danger);border:1px solid #f0b0a0;}
.tag-warn{background:var(--warn-light);color:var(--warn);border:1px solid #e8d090;}
.tag-info{background:var(--info-light);color:var(--info);border:1px solid #a0c8e8;}
.obs-box{background:var(--bg);padding:15px;border-radius:6px;border:1.5px solid var(--border);font-size:13px;line-height:1.8;}
.obs-box strong{color:var(--text);}
.obs-step{margin-bottom:12px;}
.obs-step:last-child{margin-bottom:0;}
.strategy-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;padding:15px 17px;font-size:13px;line-height:1.8;}
.strategy-box strong{color:var(--text);}
.strategy-item{margin-bottom:13px;}
.strategy-item:last-child{margin-bottom:0;}
.checklist{display:flex;flex-direction:column;gap:7px;}
.check-item{background:var(--bg);border:1.5px solid var(--border);border-radius:5px;padding:9px 13px;font-size:12.5px;color:var(--text-dim);line-height:1.6;}
.empty{text-align:center;padding:48px 20px;}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty p{font-size:13px;line-height:1.8;color:var(--text-dim);}
.err-note{font-size:11px;color:var(--danger);margin-top:6px;padding:7px 10px;background:var(--danger-light);border:1px solid #f0b0a0;border-radius:4px;display:none;}
.data-note{font-size:10px;color:var(--text-muted);line-height:1.8;font-family:'IBM Plex Mono',monospace;}
.note-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.note-card{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:10px 12px;}
.note-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.note-loc{font-size:10px;color:var(--accent2);margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}
.note-text{font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap;}
.note-del{background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;padding:0 4px;line-height:1;}
.note-del:hover{color:var(--danger);}
.note-empty{font-size:12px;color:var(--text-muted);text-align:center;padding:16px 0;}
.note-row{display:flex;gap:6px;margin-top:8px;}
.ph-acid{color:#b03020;}.ph-neutral{color:#2a7a4a;}.ph-alkaline{color:#2060a0;}
.map-controls{position:absolute;top:10px;left:10px;z-index:500;display:flex;flex-direction:column;gap:5px;}
.map-btn-group{display:flex;gap:4px;}
.map-btn{background:rgba(255,255,255,.95);border:1.5px solid var(--border2);border-radius:5px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);transition:all .15s;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.14);}
.map-btn:hover{background:#fff;color:var(--accent);}
.map-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
#roadviewContainer{position:absolute;bottom:0;left:0;width:100%;height:50%;z-index:400;display:none;border-top:2px solid var(--border2);}
.rv-close{position:absolute;top:6px;right:8px;z-index:500;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:4px;padding:3px 10px;font-size:12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>
<header>
  <div class="logo">Site Analyzer <span class="logo-sub">/ Hansen-based</span></div>
  <div class="header-tags">
    <span class="htag">카카오맵</span><span class="htag">Open-Meteo</span><span class="htag">SRTM</span>
    <span class="htag">환경부 토지피복</span><span class="htag">흙토람 V2/V3</span>
    <span class="htag">생태자연도</span><span class="htag">에어코리아</span>
  </div>
</header>
<div class="layout">
  <div id="mapWrap" style="position:relative;width:100%;height:100%;overflow:hidden;">
    <div id="map" style="width:100%;height:100%;"></div>
    <div class="map-controls">
      <div class="map-btn-group">
        <button class="map-btn active" id="btnRoad" onclick="setMapType('roadmap')">일반</button>
        <button class="map-btn" id="btnSky" onclick="setMapType('skyview')">위성</button>
        <button class="map-btn" id="btnHybrid" onclick="setMapType('hybrid')">하이브리드</button>
      </div>
      <div class="map-btn-group">
        <button class="map-btn" id="btnRV" onclick="toggleRoadview()">🚶 로드뷰</button>
      </div>
      <div class="map-btn-group">
        <button class="map-btn" id="btnVeg" onclick="toggleLayer('veg')">식생</button>
        <button class="map-btn" id="btnWetland" onclick="toggleLayer('wetland')">습지</button>
        <button class="map-btn" id="btnEcvam" onclick="toggleLayer('ecvam')">환경성평가</button>
        <button class="map-btn" id="btnEcozone" onclick="toggleLayer('ecozone')">생태보전</button>
      </div>
    </div>
    <div id="roadviewContainer">
      <button class="rv-close" onclick="closeRoadview()">✕ 닫기</button>
      <div id="roadview" style="width:100%;height:100%;"></div>
    </div>
  </div>
  <div class="panel">
    <div class="psec">
      <div class="slabel">위치 검색</div>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="주소 또는 장소명 입력..."/>
        <button onclick="searchAddr()">검색</button>
      </div>
      <div class="coord-line" id="coordLine">지도를 클릭하거나 주소를 검색하세요</div>
      <div class="err-note" id="searchErr"></div>
    </div>
    <div class="psec">
      <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()" disabled>위치를 먼저 선택하세요</button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">데이터 수집 중...</div>
      </div>
    </div>
    <div class="psec" id="dataSection" style="display:none;">
      <div class="slabel">수집된 환경 데이터</div>
      <div class="data-grid" id="dataGrid"></div>
    </div>
    <div class="psec" id="resultSection">
      <div class="empty">
        <div class="empty-icon">🌿</div>
        <p>위치를 선택하고<br>분석을 실행하세요</p>
        <p style="margin-top:14px;font-size:11px;color:var(--text-muted)">Open-Meteo · SRTM · 환경부 토지피복도<br>흙토람 토양 V2/V3 · 에어코리아</p>
      </div>
    </div>
    <div class="psec">
      <div class="slabel">스케치 노트</div>
      <div class="note-list" id="noteList"></div>
      <textarea id="noteInput" placeholder="이 지점 분석 메모 — 현장 가설, gradient, 설계 방향..."></textarea>
      <div class="note-row">
        <button onclick="saveNote()" style="flex:1">노트 저장</button>
        <button class="btn-ghost" onclick="exportNotes()">내보내기</button>
      </div>
    </div>
  </div>
</div>
<script>
// ═══ 전역 상수 (SDK 로드 전 선언 OK) ═══════════════════════════════
var VWORLD_KEY='EB3B88BE-D4B8-3026-9570-AE36A355ED86';
var SOIL_KEY='ab7f025a5d05d6704e799f216834bc31ebebdff22f2be13cdddf5b381f2b4c02';
var AIR_KEY='ab7f025a5d05d6704e799f216834bc31ebebdff22f2be13cdddf5b381f2b4c02';
var WORKER_URL='https://weathered-bar-2c29.younrake.workers.dev';
var ECVAM_KEY='EJZS-VEGK-SMTE-I887';
var ECVAM_DOMAIN='hubminyoung.github.io';
var VWORLD_DOMAIN=(function(){var h=window.location.hostname;return(!h||h===''||h==='localhost'||h==='127.0.0.1')?'hubminyoung.github.io':h;})();

// ═══ 전역 상태 ════════════════════════════════════════════════════
var kakaoMap,kakaoMarker,roadviewClient,roadview;
var selLat=null,selLng=null,lastResult=null;
var wmsLayers={veg:null,wetland:null,ecvam:null,ecozone:null};
var wmsActive={veg:false,wetland:false,ecvam:false,ecozone:false};

// ═══ 카카오맵 초기화 콜백 (SDK onload 호출) ══════════════════════
function initKakaoMap(){
  kakaoMap=new kakao.maps.Map(document.getElementById('map'),{
    center:new kakao.maps.LatLng(37.5665,126.9780),
    level:5,
    mapTypeId:kakao.maps.MapTypeId.ROADMAP
  });
  roadviewClient=new kakao.maps.RoadviewClient();
  roadview=new kakao.maps.Roadview(document.getElementById('roadview'));
  kakao.maps.event.addListener(kakaoMap,'click',function(e){
    setLocation(e.latLng.getLat(),e.latLng.getLng());
  });
  // WMS 레이어 초기화 (Cloudflare Worker 프록시 경유)
  wmsLayers.veg    = makeKakaoWmsLayer('nie','mv_map_ntee_vtn_pyn',0.6);
  wmsLayers.wetland= makeKakaoWmsLayer('nie','mv_map_wtl_inland_pyn_2022',0.55);
  wmsLayers.ecvam  = makeKakaoWmsLayer('ecvam','lt_c_enveval_res',0.65);
  wmsLayers.ecozone= makeKakaoWmsLayer('ecvam','lt_c_ecscnsrvatn',0.6);
}

// ═══ WMS 레이어 (카카오 CustomOverlay + canvas tile) ═══════════
// Cloudflare Worker가 CORS 프록시 역할
// Worker URL: weathered-bar-2c29.younrake.workers.dev
// Worker 코드에 /nie, /ecvam 경로 추가 필요 (아래 참고)
function makeKakaoWmsLayer(type,layerName,opacity){
  // 카카오맵 커스텀 오버레이로 WMS 타일 구현
  var tileSize=256;
  var container=document.createElement('div');
  container.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;';
  var tiles={};
  var active=false;
  var mapRef=null;

  function bboxFromTile(x,y,z){
    var n=Math.pow(2,z);
    var lon1=(x/n)*360-180;
    var lon2=((x+1)/n)*360-180;
    var lat1=Math.atan(Math.sinh(Math.PI*(1-2*(y+1)/n)))*180/Math.PI;
    var lat2=Math.atan(Math.sinh(Math.PI*(1-2*y/n)))*180/Math.PI;
    return lon1+','+lat1+','+lon2+','+lat2;
  }
  function wmsUrl(x,y,z){
    var bbox=bboxFromTile(x,y,z);
    var base='SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&FORMAT=image%2Fpng&TRANSPARENT=true'
      +'&LAYERS='+layerName+'&SRS=EPSG%3A4326&STYLES=&WIDTH='+tileSize+'&HEIGHT='+tileSize+'&BBOX='+bbox;
    if(type==='nie'){
      return WORKER_URL+'/nie?'+base+'&authKey=R40K8VWM6J89X8889E7J8OQQSJ5OKJF832B64272';
    }else{
      return WORKER_URL+'/ecvam?'+base+'&APIKEY='+ECVAM_KEY+'&DOMAIN='+ECVAM_DOMAIN;
    }
  }

  return{
    setMap:function(map){
      if(map){
        mapRef=map;active=true;
        // 카카오맵에 이미지 오버레이 레이어로 추가
        this._renderLayer();
      }else{
        active=false;mapRef=null;
        // 레이어 제거
        if(this._overlay){this._overlay.setMap(null);this._overlay=null;}
      }
    },
    _overlay:null,
    _renderLayer:function(){
      var self=this;
      if(!mapRef)return;
      // 현재 뷰포트 기준 대표 타일 1장으로 전체 영역 커버 (단순 구현)
      var bounds=mapRef.getBounds();
      var sw=bounds.getSouthWest(),ne=bounds.getNorthEast();
      var bbox=sw.getLng()+','+sw.getLat()+','+ne.getLng()+','+ne.getLat();
      var mapDiv=document.getElementById('map');
      var w=mapDiv.offsetWidth,h=mapDiv.offsetHeight;
      var base='SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&FORMAT=image%2Fpng&TRANSPARENT=true'
        +'&LAYERS='+layerName+'&SRS=EPSG%3A4326&STYLES=&WIDTH='+w+'&HEIGHT='+h+'&BBOX='+bbox;
      var url;
      if(type==='nie'){
        url=WORKER_URL+'/nie?'+base+'&authKey=R40K8VWM6J89X8889E7J8OQQSJ5OKJF832B64272';
      }else{
        url=WORKER_URL+'/ecvam?'+base+'&APIKEY='+ECVAM_KEY+'&DOMAIN='+ECVAM_DOMAIN;
      }
      // CustomOverlay로 이미지 표시
      if(this._overlay){this._overlay.setMap(null);}
      var center=mapRef.getCenter();
      var content='<img src="'+url+'" style="position:absolute;top:0;left:0;width:'+w+'px;height:'+h+'px;opacity:'+opacity+';pointer-events:none;" onerror="this.style.display=\'none\'">';
      // 실제로는 지도 이동 시 갱신 필요 — idle 이벤트 활용
      if(!this._listening){
        this._listening=true;
        kakao.maps.event.addListener(mapRef,'idle',function(){if(active)self._renderLayer();});
      }
      // 지도 컨테이너에 직접 오버레이 div 삽입
      var existingOverlay=document.getElementById('wms_overlay_'+layerName);
      if(existingOverlay)existingOverlay.remove();
      var overlayDiv=document.createElement('div');
      overlayDiv.id='wms_overlay_'+layerName;
      overlayDiv.style.cssText='position:absolute;top:0;left:0;width:'+w+'px;height:'+h+'px;pointer-events:none;z-index:10;';
      overlayDiv.innerHTML='<img src="'+url+'" style="width:100%;height:100%;opacity:'+opacity+';" onerror="this.style.display=\'none\'">';
      document.getElementById('map').appendChild(overlayDiv);
    }
  };
}

// ═══ 레이어 토글 ══════════════════════════════════════════════════
function toggleLayer(name){
  var btnMap={veg:'btnVeg',wetland:'btnWetland',ecvam:'btnEcvam',ecozone:'btnEcozone'};
  var btn=document.getElementById(btnMap[name]);
  if(wmsActive[name]){
    wmsLayers[name].setMap(null);
    wmsActive[name]=false;
    if(btn)btn.classList.remove('active');

async function fetchMeteo(lat,lng){
  var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lng+'&daily=sunshine_duration,precipitation_sum,temperature_2m_max,temperature_2m_min,et0_fao_evapotranspiration&timezone=Asia%2FSeoul&past_days=30&forecast_days=7');
  var d=await r.json();var s=d.daily;
  var vals=function(a){return(a||[]).filter(function(v){return v!=null;});};
  var avg=function(a){var v=vals(a);return v.length?v.reduce(function(a,b){return a+b;},0)/v.length:null;};
  var absMin=vals(s.temperature_2m_min).length?Math.min.apply(null,vals(s.temperature_2m_min)):null;
  return{
    sunshine:avg(s.sunshine_duration)!=null?(avg(s.sunshine_duration)/3600).toFixed(1):null,
    precip:avg(s.precipitation_sum)!=null?avg(s.precipitation_sum).toFixed(1):null,
    tempMax:avg(s.temperature_2m_max)!=null?avg(s.temperature_2m_max).toFixed(1):null,
    tempMin:avg(s.temperature_2m_min)!=null?avg(s.temperature_2m_min).toFixed(1):null,
    tempAbsMin:absMin!=null?absMin.toFixed(1):null,
    et0:avg(s.et0_fao_evapotranspiration)!=null?avg(s.et0_fao_evapotranspiration).toFixed(1):null
  };
}
async function fetchElevation(lat,lng){
  var d=0.001;
  var pts=[[lat,lng],[lat+d,lng],[lat-d,lng],[lat,lng+d],[lat,lng-d]];
  try{
    var r=await fetch('https://api.open-meteo.com/v1/elevation?latitude='+pts.map(function(p){return p[0];}).join(',')+'&longitude='+pts.map(function(p){return p[1];}).join(','));
    var data=await r.json();var el=data.elevation;
    if(!el||el.length<5)throw new Error();
    var e=el[0],eN=el[1],eS=el[2],eE=el[3],eW=el[4];
    var cosLat=Math.cos(lat*Math.PI/180);
    var dx=(eE-eW)/(2*d*111320*cosLat),dy=(eN-eS)/(2*d*111320);
    var slope=Math.round(Math.atan(Math.sqrt(dx*dx+dy*dy))*180/Math.PI*10)/10;
    var aspect=Math.round(Math.atan2(dx,-dy)*180/Math.PI);if(aspect<0)aspect+=360;
    return{elev:Math.round(e),slope:slope,aspect:aspect,aspectLabel:aspectToLabel(aspect)};
  }catch(e2){
    try{var r2=await fetch('https://api.open-meteo.com/v1/elevation?latitude='+lat+'&longitude='+lng);var data2=await r2.json();if(data2.elevation&&data2.elevation.length>0)return{elev:Math.round(data2.elevation[0]),slope:null,aspect:null,aspectLabel:'—'};}catch(e3){}
    return{elev:null,slope:null,aspect:null,aspectLabel:'—'};
  }
}
function aspectToLabel(deg){if(deg==null)return'—';var labels=['북(N)','북동(NE)','동(E)','남동(SE)','남(S)','남서(SW)','서(W)','북서(NW)'];return labels[Math.round(deg/45)%8];}
function aspectSunNote(al){
  if(!al||al==='—')return null;
  if(al.includes('남'))return'남향 — 일조 최대, 여름 과열 주의';
  if(al.includes('북'))return'북향 — 일조 부족, 음지성 식재 유리';
  if(al.includes('동'))return'동향 — 오전 광, 오후 그늘';
  if(al.includes('서'))return'서향 — 오후 광, 여름 복사열 주의';
  return null;
}
async function fetchVworld(lat,lng,data){
  var geom='POINT('+lng+' '+lat+')';
  var baseUrl='https://api.vworld.kr/req/data?service=data&request=GetFeature&data='+data+'&key='+VWORLD_KEY+'&domain='+VWORLD_DOMAIN+'&geomFilter='+encodeURIComponent(geom)+'&buffer=100&size=1&format=json&geometry=false&attribute=true&crs=EPSG:4326';
  try{
    var r=await fetch(baseUrl,{referrerPolicy:'no-referrer'});var d=await r.json();
    if(d.response&&d.response.status==='OK'&&d.response.result&&d.response.result.featureCollection&&d.response.result.featureCollection.features&&d.response.result.featureCollection.features.length>0)return d.response.result.featureCollection.features[0].properties;
    if(d.response&&d.response.status==='ERROR')return null;
  }catch(e){}
  return new Promise(function(resolve){
    var cb='_vw_'+Date.now()+'_'+Math.floor(Math.random()*9999);var done=false;
    var clean=function(){done=true;delete window[cb];var s=document.getElementById(cb);if(s)s.parentNode.removeChild(s);};
    window[cb]=function(d){if(done)return;clean();try{if(d.response&&d.response.status==='OK'&&d.response.result&&d.response.result.featureCollection&&d.response.result.featureCollection.features&&d.response.result.featureCollection.features.length>0)resolve(d.response.result.featureCollection.features[0].properties);else resolve(null);}catch(e){resolve(null);}};
    var s=document.createElement('script');s.id=cb;s.src=baseUrl+'&callback='+cb;s.onerror=function(){if(!done){clean();resolve(null);}};
    document.body.appendChild(s);setTimeout(function(){if(!done){clean();resolve(null);}},10000);
  });
}

function slopeCodeToText(code){var m={'1':'0~2% (평탄)','2':'2~7% (완경사)','3':'7~15% (경사)','4':'15~30% (급경사)','5':'30%↑ (험준)'};return m[String(code)]||'code '+code;}
function phToNote(ph){var v=parseFloat(ph);if(isNaN(v))return{text:ph,cls:''};if(v<5.5)return{text:ph+' — 강산성',cls:'ph-acid'};if(v<6.5)return{text:ph+' — 약산성 (적합)',cls:'ph-neutral'};if(v<7.5)return{text:ph+' — 중성 (최적)',cls:'ph-neutral'};return{text:ph+' — 알칼리성',cls:'ph-alkaline'};}
function omToNote(om){var v=parseFloat(om);if(isNaN(v))return om;if(v<10)return om+'g/kg — 낮음 (척박)';if(v<30)return om+'g/kg — 보통';return om+'g/kg — 높음 (비옥)';}
async function fetchMceeLC(lat,lng){
  var d=0.005,minx=lng-d,miny=lat-d,maxx=lng+d,maxy=lat+d;
  var params='?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetFeatureInfo&LAYERS=EGIS:lv3_2025y&QUERY_LAYERS=EGIS:lv3_2025y&INFO_FORMAT=application/json&SRS=EPSG:4326&BBOX='+minx+','+miny+','+maxx+','+maxy+'&WIDTH=256&HEIGHT=256&X=128&Y=128';
  var r=await fetch(WORKER_URL+params);if(!r.ok)return null;

  return null;
}
function l2ToLc(code,name){
  var c=String(code||''),n=(name||'').toLowerCase(),num=parseInt(c);
  if(num===310||n.includes('침엽수림'))return{lnlc_cd:'3',lnlc_nm:'침엽수림',hansen:'W (침엽수하부)',_src:'환경부(2025)'};
  if(num===320||n.includes('활엽수림'))return{lnlc_cd:'3',lnlc_nm:'활엽수림',hansen:'W (활엽수하부)',_src:'환경부(2025)'};
  if(num===330||n.includes('혼효림'))return{lnlc_cd:'3',lnlc_nm:'혼효림',hansen:'W (혼효림가장자리)',_src:'환경부(2025)'};
  if((num>=300&&num<400)||n.includes('산림')||n.includes('수림'))return{lnlc_cd:'3',lnlc_nm:name||'산림지',hansen:'W (삼림형)',_src:'환경부(2025)'};
  if((num>=100&&num<200)||n.includes('주거')||n.includes('상업')||n.includes('공업')||n.includes('시가화'))return{lnlc_cd:'1',lnlc_nm:name||'시가화지역',_src:'환경부(2025)'};
  if((num>=200&&num<300)||n.includes('논')||n.includes('밭')||n.includes('농경'))return{lnlc_cd:'2',lnlc_nm:name||'농경지',_src:'환경부(2025)'};
  if((num>=400&&num<500)||n.includes('초지'))return{lnlc_cd:'4',lnlc_nm:name||'초지',_src:'환경부(2025)'};
  if((num>=500&&num<600)||n.includes('습지'))return{lnlc_cd:'5',lnlc_nm:name||'습지',_src:'환경부(2025)'};
  if((num>=600&&num<700)||n.includes('나지'))return{lnlc_cd:'6',lnlc_nm:name||'나지',_src:'환경부(2025)'};
  if((num>=700&&num<800)||n.includes('수역')||n.includes('하천'))return{lnlc_cd:'7',lnlc_nm:name||'수역',_src:'환경부(2025)'};
  return{lnlc_cd:'0',lnlc_nm:name||code||'기타',_src:'환경부(2025)'};
}
function uqToLc(p){

  if(nm.includes('주거')||nm.includes('상업')||nm.includes('공업'))return{lnlc_cd:'1',lnlc_nm:p.uq_nm||'시가화지역',_src:'용도지역'};

}

  setProgress(43,'PNU 추출...');var pnu=null;try{pnu=await fetchPNU(selLat,selLng);}catch(e){}
  setProgress(56,'흙토람 V2...');var soilProfile=null;if(pnu){try{soilProfile=await fetchSoilProfile(pnu);}catch(e){}}
  setProgress(68,'흙토람 V3...');var soilDetail=null;if(pnu){try{soilDetail=await fetchSoilDetail(pnu);}catch(e){}}
  var drain=null,soil=null;
  if(!soilDetail){
    setProgress(76,'국립농업과학원 폴백...');
    try{drain=await fetchVworld(selLat,selLng,'LT_C_ASITSOILDRA');}catch(e){}
    try{soil=await fetchVworld(selLat,selLng,'LT_C_ASITDEEPSOIL');}catch(e){}
  }
  setProgress(86,'대기오염...');var aq=null;try{aq=await fetchAirQuality(selLat,selLng);}catch(e){}
  setProgress(97,'분석 중...');await new Promise(function(r){setTimeout(r,300);});

  var sun=parseFloat(meteo.sunshine)||0;
  var precip=parseFloat(meteo.precip)||0;
  var et0Val=parseFloat(meteo.et0)||5;
  var wi=et0Val>0?precip/et0Val:1;
  var e=elev.elev;
  var isLowland=e!=null&&e<15;
  var light=sun>7?'so (양지)':sun>4?'hs (반음지)':'sch (음지)';
  var moistureRaw='2 (적습)';
  if(wi<0.6||precip<1.2)moistureRaw='1 (건조)';
  else if(wi>1.4||precip>4)moistureRaw='4 (습윤)';
  else if(wi>1.0)moistureRaw='3 (중간)';
  var moistureFinal=moistureRaw+(isLowland?' (저지대·수변 국지적 습윤 가능)':'');
  var lcI=lcInfo(lc&&(lc.lnlc_cd||lc.code),lc&&(lc.lnlc_nm||lc.label),lc);
  var hansenHab=lcI.hansen!=='—'?lcI.hansen.split(' ')[0]:(isLowland?'W':'Fr');
  var hansenCode=light+'  /  '+moistureRaw.split(' ')[0]+'  /  '+hansenHab;
  var drainLabel=(soilDetail&&soilDetail.drainage)||(drain&&drain.label)||'—';
  var textureLabel=(soilDetail&&soilDetail.texture)||(soil&&soil.label)||'—';
  var drainCode=parseInt((drain&&drain.code_dc)||4);
  var soilLabel=((soilDetail&&soilDetail.texture)||(soil&&soil.label)||'').toLowerCase();
  var lcRisk=lcI.risk;
  var slopeRisk=elev.slope!=null&&elev.slope>15;
  lastResult={lat:selLat,lng:selLng,hansenCode:hansenCode,pnu:pnu};

  setProgress(100,'완료');
  setTimeout(function(){
    document.getElementById('progressWrap').style.display='none';
    document.getElementById('dataSection').style.display='block';
    document.getElementById('dataGrid').innerHTML=[
      {l:'일조시간',v:meteo.sunshine||'—',u:'hr/day',s:sun>6?'양지':sun>3?'반그늘':'그늘',src:'Open-Meteo'},
      {l:'일평균강수',v:meteo.precip||'—',u:'mm/day',s:precip<1.5?'건조':precip<3.5?'적습':'습윤',src:'Open-Meteo'},
      {l:'최저기온',v:meteo.tempMin||'—',u:'°C',s:meteo.tempAbsMin?'Zone '+hardinessZone(meteo.tempAbsMin):'-',src:'Open-Meteo'},
      {l:'고도',v:e!=null?e:'—',u:'m',s:e!=null?(e<5?'저지대':e<20?'평지':'고지'):'—',src:'SRTM'},
      {l:'경사',v:elev.slope!=null?elev.slope:'—',u:'°',s:elev.slope!=null?(elev.slope<3?'평탄':elev.slope<10?'완경사':elev.slope<20?'중경사':'급경사'):'—',src:'SRTM'},
      {l:'사면향',v:elev.aspectLabel||'—',u:'',s:aspectSunNote(elev.aspectLabel)||'',src:'SRTM'},
      {l:'토지피복',v:'<span class="lc-badge '+lcI.cls+'">'+lcI.text+'</span>',u:'',s:'',src:lcSrc||'환경부'},
      {l:'배수등급',v:drainLabel,u:'',s:'',src:'국립농업과학원'},
      {l:'심토토성',v:textureLabel,u:'',s:'',src:'국립농업과학원'},
    ].map(function(i){return '<div class="dc"><div class="dc-label">'+i.l+'</div><div class="dc-value">'+i.v+'<span class="dc-unit">'+i.u+'</span></div>'+(i.s?'<div class="dc-sub">'+i.s+'</div>':'')+'<span class="src-tag">'+i.src+'</span></div>';}).join('');

    var pnuNote=pnu?'<span style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:var(--text-muted)">PNU: '+pnu+'</span>':'';
    document.getElementById('resultSection').innerHTML=
      '<div class="slabel">입지 분석 결과</div>'+
      '<div class="hansen-box">'+
        '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em;">Hansen 입지 코드</div>'+
        '<div style="font-size:17px;font-weight:700;color:var(--accent2);font-family:\'IBM Plex Mono\',monospace;margin-bottom:4px;">'+hansenCode+'</div>'+
        '<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;">광환경 / 수분 / 식생형</div>'+
        '<div style="font-size:12.5px;color:var(--text-dim);line-height:1.9;">배수: <strong>'+drainLabel+'</strong> | 토성: <strong>'+textureLabel+'</strong><br>고도 '+(e!=null?e:'—')+'m | 경사 '+(elev.slope!=null?elev.slope+'°':'—')+' | 향: '+(elev.aspectLabel||'—')+'</div>'+
        '<div style="margin-top:8px;">'+pnuNote+'</div>'+
      '</div>'+
      '<div class="iblock"><div class="iblock-label">입지 해석 요약</div>'+
        '<div style="font-size:13px;line-height:1.85;color:var(--text);background:var(--bg);padding:13px 15px;border-radius:6px;border:1.5px solid var(--border);">'+
          '• <strong>광환경:</strong> '+light+' (일조 '+(meteo.sunshine||'—')+'시간/일)<br>'+
          '• <strong>수분 환경:</strong> '+moistureFinal+'<br>'+
          '• <strong>토양 경향:</strong> '+(soilLabel.includes('사')||soilLabel.includes('양질')?'빠른 건조화 경향':'중간~보수력 양호')+' · 배수 '+(drainCode<=2?'매우 양호':drainCode===3?'보통':'불량')+'<br>'+
          '• <strong>입지 특성:</strong> '+lcI.text+' ('+lcI.hansen+') '+(isLowland?'· 저지대/수변 인접':'')+
          (lcRisk?'<br>• <strong>주의:</strong> '+lcRisk:'')+
          (slopeRisk?'<br>• <strong>경사:</strong> '+elev.slope+'° — 침식·건조 위험':'')+
          (aqRisk?'<br>• <strong>대기:</strong> PM2.5 '+aq.pm25+'㎍/m³ — 내오염성 고려':'')+
        '</div></div>'+
      '<div class="iblock"><div class="iblock-label">현장 깊이 관찰 가이드</div>'+
        '<div class="obs-box">'+
          '<div class="obs-step"><strong>1. 눈으로 먼저 읽기</strong><br>• 미세 지형 (10~30cm 고저 차이) — 수분·광 변화<br>• 식생 지표: 이끼·양치=습윤, 잔디 마름=건조+compaction<br>• 쇠뜨기=배수불량, 개망초=교란, 쑥=건조<br>• 물 흔적, 뿌리 노출, 식생 활력도</div>'+
          '<div class="obs-step"><strong>2. Probe 검증 (70~75cm 슬롯형)</strong><br>• 잘 자라는 곳 / 못 자라는 곳 / 경계부 4~6곳<br>• 0–20cm: 색·질감·뿌리 밀도<br>• 20–60cm: compaction, 색 변화(회색=환원층), 수분 패턴</div>'+
          '<div class="obs-step"><strong>3. Gradient 발견</strong><br>• 수분·광·토양 변화 흐름을 지도에 그려보기<br>• 교란 정도 파악 → low-maintenance mix 활용</div>'+
        '</div></div>'+
      '<div class="iblock"><div class="iblock-label">설계 전략 제안</div>'+
        '<div class="strategy-box">'+
          '<div class="strategy-item"><strong>1. 수분 전략</strong><br>초기 6~10주 집중 관수 (양지·배수 빠른 구간). 이후 건조 내성 Matrix 전환.<br>'+(isLowland?'저지대·수변은 별도 존으로 gradient 활용.':'수분 이질 구간 발견 시 존 분리.')+'</div>'+
          '<div class="strategy-item"><strong>2. 구조·피복 전략</strong><br>S-strategy 25~35% (겨울 골격). Matrix 55~65% (빠른 피복). 드리프트 3~15m 권장.</div>'+
          '<div class="strategy-item"><strong>3. 공간 전략</strong><br>수분·광 gradient를 따라 밀도·종 조합 변화. 경계부 blending. 큰 흐름(drift) 중심.</div>'+
        '</div></div>'+
      '<div class="iblock"><div class="iblock-label">현장 확인 체크리스트</div>'+
        '<div class="checklist">'+
          '<div class="check-item">□ 70~75cm 슬롯형 Soil Probe — 잘 자라는 곳 / 못 자라는 곳 / 경계부 4~6곳</div>'+
          '<div class="check-item">□ 미세 지형 고저 차이 (10~30cm)와 수분 패턴 스케치</div>'+
          '<div class="check-item">□ 기존 자생 식물·우점 잡초 분포 기록</div>'+
          '<div class="check-item">□ 비 온 후 12~48시간 물 빠짐·고임 확인</div>'+
          '<div class="check-item">□ 하루 중 광·그늘 패턴 (오전 10시, 오후 2~4시)</div>'+
          '<div class="check-item">□ 주변 구조물·바람·복사열·포장면 영향</div>'+
        '</div>'+
        '<div class="data-note" style="margin-top:12px;">원격 데이터는 출발점. 현장 관찰로 가설을 검증하고 판단하라.<br>신뢰도 약 60~75% — 반드시 현장 보완 필요.</div>'+
      '</div>'+
      '<div class="data-note">출처: Open-Meteo · SRTM · Vworld · 흙토람 · 환경부 · 에어코리아</div>';
    btn.disabled=false;btn.textContent='재분석';
  },300);
}

// ═══ 스케치 노트 ══════════════════════════════════════════════════
var NK='site_analyzer_notes';
function loadNotes(){try{return JSON.parse(localStorage.getItem(NK)||'[]');}catch(e){return[];}}
function saveNotes(n){try{localStorage.setItem(NK,JSON.stringify(n));}catch(e){}}
function renderNotes(){
  var notes=loadNotes();var el=document.getElementById('noteList');
  if(!el)return;
  if(notes.length===0){el.innerHTML='<div class="note-empty">저장된 노트 없음</div>';return;}
  el.innerHTML=[].concat(notes).reverse().map(function(n,i){
    return '<div class="note-card"><div class="note-meta"><span>'+n.date+'</span><button class="note-del" onclick="deleteNote('+(notes.length-1-i)+')">✕</button></div><div class="note-loc">'+n.loc+(n.pnu?' · PNU:'+n.pnu:'')+'</div><div class="note-text">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div></div>';
  }).join('');
}
function saveNote(){
  var text=document.getElementById('noteInput').value.trim();
  if(!text){alert('내용을 입력하세요.');return;}
  var notes=loadNotes();
  var now=new Date();
  var date=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var loc=selLat?selLat.toFixed(4)+'°N '+selLng.toFixed(4)+'°E':'위치 미선택';
  notes.push({date:date,loc:loc,text:text,pnu:lastResult&&lastResult.pnu||null,lat:selLat,lng:selLng});
  saveNotes(notes);document.getElementById('noteInput').value='';renderNotes();
}
function deleteNote(idx){if(!confirm('이 노트를 삭제할까요?'))return;var notes=loadNotes();notes.splice(idx,1);saveNotes(notes);renderNotes();}
function exportNotes(){
  var notes=loadNotes();if(notes.length===0){alert('저장된 노트가 없습니다.');return;}
  var txt=notes.map(function(n){return '['+n.date+'] '+n.loc+(n.pnu?' PNU:'+n.pnu:'')+'\n'+n.text;}).join('\n\n---\n\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.download='site_notes_'+new Date().toISOString().slice(0,10)+'.txt';a.click();
}

});
